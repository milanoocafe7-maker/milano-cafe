<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميلانو كافيه</title>
    
    <!-- Meta tags for SEO -->
    <meta name="description" content="مرحباً بكم في ميلانو كافيه. استكشف قائمتنا الرقمية الفاخرة التي تضم مشروبات القهوة والمشروبات الساخنة والباردة والطازجة والحلويات والمأكولات في الخرطوم، السودان.">
    <meta name="keywords" content="ميلانو كافيه، السودان، قهوة الخرطوم، قهوة فاخرة، قائمة رقمية، QR مطعم، كافيه سودان">
    
    <!-- Bootstrap 5 RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <!-- FontAwesome for Premium Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <!-- Custom Premium Stylesheet -->
    <link rel="stylesheet" href="css/style.css?v=18">

    <style>
        /* Ensure LTR switch loads correct Bootstrap */
        body.ltr-mode {
            direction: ltr;
            text-align: left;
        }
    </style>
</head>
<body>

    <!-- ⏳ PREMIUM PRELOAD SCREEN -->
    <div id="preloader">
        <div class="preload-logo-container">
            <img src="logo.jpeg" alt="ميلانو كافيه" class="preload-logo" onerror="this.src='https://images.unsplash.com/photo-1507133750040-4a8f57021571?q=80&w=300&auto=format&fit=crop'">
            <h1 class="preload-title">MILANO CAFE</h1>

        </div>
        <div class="gold-loader"></div>
    </div>

    <!-- 1️⃣ HERO SECTION -->
    <header class="hero-section">
        <!-- Top bar for Language Toggle to prevent arch collision -->
        <div class="hero-topbar">
            <button class="lang-btn hero-lang-btn" id="lang-toggle-btn" onclick="toggleLanguage()">English</button>
        </div>
        
        <!-- Gold arch spans full hero height -->
        <div class="hero-arch"></div>
        <div class="hero-content">
            <img src="logo.jpeg" alt="ميلانو كافيه" class="hero-logo" onerror="this.src='https://images.unsplash.com/photo-1507133750040-4a8f57021571?q=80&w=300&auto=format&fit=crop'">
            <h2 class="hero-title brand-font">Milano Cafe</h2>
            <p class="hero-subtitle" id="hero-subtitle-text">تجربة قهوة بطعم مميز</p>
            <a href="#menu-anchor" class="btn btn-premium" id="btn-explore-text">تصفح المنيو</a>
        </div>
    </header>

    <!-- 2️⃣ STICKY NAVIGATION -->
    <nav class="sticky-navbar" id="menu-anchor">
        <div class="container">
            <div class="nav-container" id="category-nav-links">
                <!-- Dynamically generated -->
            </div>
        </div>
    </nav>

    <!-- 3️⃣ DIGITAL MENU SECTIONS -->
    <main class="container my-5">
        <div id="no-products-message" class="text-center my-5 d-none">
            <i class="fa-solid fa-mug-hot fa-3x mb-3 text-muted"></i>
            <p class="fs-5 text-muted" id="no-products-text">لم يتم العثور على عناصر تطابق بحثك.</p>
        </div>
        <div id="menu-content"></div>
    </main>

    <!-- 7️⃣ FOOTER -->
    <footer class="footer-section">
        <div class="container text-center text-md-start">
            <div class="row g-4 justify-content-between">
                <div class="col-md-4 text-center text-md-start">
                    <h3 class="footer-brand">MILANO CAFE</h3>
                </div>
                <div class="col-md-4 text-center">
                    <h4 class="footer-heading" id="footer-contact-title">اتصل بنا</h4>
                    <ul class="list-unstyled small">
                      
                        <li class="mb-2">
                            <i class="fa-solid fa-phone me-2 text-accent"></i>
                            <a href="tel:+249123456789" class="footer-link" dir="ltr">+249 123 456 789</a>
                        </li>
                        <li class="mb-2">
                            <i class="fa-solid fa-location-dot me-2 text-accent"></i>
                            <span id="footer-address">أم درمان - السودان</span>
                        </li>
                    </ul>
                </div>
                <div class="col-md-4 text-center text-md-end">
                    <h4 class="footer-heading" id="footer-follow-title">تابعنا</h4>
                    <div>
                        <a href="#" class="footer-social-icon"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class="footer-social-icon"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class="footer-social-icon"><i class="fa-brands fa-twitter"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-copyright text-center">
                <p class="mb-0">&copy; <span id="current-year"></span> Milano Cafe. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main Script -->
    <script type="module" src="js/main.js?v=6"></script>
</body>
</html>
